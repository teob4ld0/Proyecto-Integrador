services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: proyectodb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./Backend
    ports:
      - "5000:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=proyectodb
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_KEY=UnaClaveSecretaMuyLargaYSeguraParaJWT_12345!
      - JWT_ISSUER=DanmakrewAPI
      - JWT_AUDIENCE=DanmakrewUsers
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./Frontend
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8080
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  pgdata:
