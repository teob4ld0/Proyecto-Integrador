services:
  api:
    build: ./Backend
    ports:
      - "8080:8080"
    env_file:
      - ./Backend/.env
    environment:
      - NODE_ENV=production
      - PORT=8080
      - HOST=0.0.0.0
      - DB_PATH=/app/data/danmakrew.db
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlite_data:
